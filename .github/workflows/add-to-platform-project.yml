# Synchronize Issues and Pull Requests with the organization delivery project.
#
# Required organization variables:
#   - PLATFORM_PROJECT_ID
#   - PROJECT_BOT_CLIENT_ID
#
# Required organization secret:
#   - PROJECT_BOT_PRIVATE_KEY
#
# This caller and its reusable workflow handle trusted metadata only. Never add
# a checkout, download, build, test, or execution of pull-request-controlled
# code.

name: Sync XDenovo Platform project status

on:
  issues:
    types: [opened, assigned, unassigned, reopened, transferred, closed]
  pull_request_target:
    types: [opened, reopened, converted_to_draft, ready_for_review, closed]

permissions: {}

jobs:
  sync-project-status:
    name: Sync project status
    if: github.repository_owner == 'XDenovo'
    uses: XDenovo/.github/.github/workflows/sync-platform-project-status.yml@9bae978df5f20d870f290f576caedd9e8df44eda
    with:
      project_id: ${{ vars.PLATFORM_PROJECT_ID }}
      app_client_id: ${{ vars.PROJECT_BOT_CLIENT_ID }}
    secrets:
      app_private_key: ${{ secrets.PROJECT_BOT_PRIVATE_KEY }}
